name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petadex-mmseq2-search
  LAMBDA_FUNCTION: petadex-mmseqs2-search

permissions:
  contents: write # for tagging
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          fetch_all_tags: true

  deploy:
    needs: version
    if: needs.version.outputs.new_tag != ''
    # Native arm64 runner — the image is linux/arm64 (Graviton Lambda). Building
    # natively avoids QEMU emulation, which previously made the DIAMOND source
    # compile take ~40 min. No setup-qemu-action needed when host arch == target.
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.version.outputs.new_tag }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.version.outputs.new_tag }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION

      # --- DIAMOND scale-out (transition; additive — legacy above is untouched) ---
      # Updates CODE only on the three handlers that share this image. The
      # functions + state machine are provisioned once by
      # scripts/provision_diamond_infra.sh; these steps no-op (with a notice)
      # until that bootstrap has run, so they never break the live pipeline.
      - name: Update DIAMOND function code (orchestrator/worker/aggregator)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.version.outputs.new_tag }}
        run: |
          for FN in petadex-diamond-orchestrator petadex-diamond-worker petadex-diamond-aggregator; do
            if aws lambda get-function --function-name "$FN" >/dev/null 2>&1; then
              echo "Updating $FN -> $IMAGE_TAG"
              aws lambda update-function-code --function-name "$FN" \
                --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG >/dev/null
              aws lambda wait function-updated --function-name "$FN"
            else
              echo "::notice::$FN not provisioned yet (run scripts/provision_diamond_infra.sh) — skipping."
            fi
          done

      - name: Update DIAMOND state machine definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SM_ARN="arn:aws:states:${AWS_REGION}:${ACCOUNT_ID}:stateMachine:petadex-diamond-search"
          if aws stepfunctions describe-state-machine --state-machine-arn "$SM_ARN" >/dev/null 2>&1; then
            sed -e "s|\${WorkerFunctionArn}|arn:aws:lambda:${AWS_REGION}:${ACCOUNT_ID}:function:petadex-diamond-worker|g" \
                -e "s|\${AggregatorFunctionArn}|arn:aws:lambda:${AWS_REGION}:${ACCOUNT_ID}:function:petadex-diamond-aggregator|g" \
                infra/search_state_machine.asl.json > /tmp/definition.json
            echo "Updating state machine definition for $SM_ARN"
            aws stepfunctions update-state-machine --state-machine-arn "$SM_ARN" \
              --definition file:///tmp/definition.json >/dev/null
          else
            echo "::notice::state machine not provisioned yet (run scripts/provision_diamond_infra.sh) — skipping."
          fi

      - name: Regenerate example searches
        run: |
          python3 - <<'EOF'
          import boto3, json, re, sys, time

          lambda_client = boto3.client('lambda', region_name='us-east-1')
          s3 = boto3.client('s3', region_name='us-east-1')
          BUCKET = 'petadex'
          ORCHESTRATOR = 'petadex-diamond-orchestrator'
          # The orchestrator returns a job_id immediately; the DIAMOND fan-out
          # writes the result ~500s later (cold, 20 shards). Poll, don't block on
          # invoke. 14 min covers a cold run with margin.
          POLL_TIMEOUT_S = 840
          POLL_INTERVAL_S = 15

          # Parse example-sequences.txt
          examples = []
          with open('example-sequences.txt') as f:
              current_header, current_seq = None, []
              for line in f:
                  line = line.rstrip()
                  if line.startswith('>'):
                      if current_header:
                          examples.append((current_header, '\n'.join(current_seq)))
                      current_header = line[1:].strip()
                      current_seq = []
                  elif line:
                      current_seq.append(line)
              if current_header:
                  examples.append((current_header, '\n'.join(current_seq)))

          # Phase 1: fan out one orchestrator invocation per example. Each starts
          # an independent Step Functions execution, so all run concurrently.
          jobs = []
          for name, sequence in examples:
              slug = re.sub(r'[^a-z0-9]+', '_', name.lower()).strip('_')
              example_key = f'example_{slug}'
              session_id = f'regen_{example_key}'
              fasta = f'>{name}\n{sequence}'
              print(f'Invoking orchestrator for {example_key}...')
              resp = lambda_client.invoke(
                  FunctionName=ORCHESTRATOR,
                  Payload=json.dumps({
                      'action': 'search',
                      'sessionId': session_id,
                      'sequence': fasta,
                      'max_results': 50,
                  }),
                  InvocationType='RequestResponse',
              )
              payload = json.loads(resp['Payload'].read())
              if resp.get('FunctionError') or payload.get('statusCode') != 200:
                  print(f'::warning::{example_key}: orchestrator invoke failed: {payload}')
                  continue
              body = json.loads(payload['body'])
              job_id = body['job_id']
              jobs.append({
                  'example_key': example_key,
                  'result_key': f'results/{session_id}/{job_id}.json',
                  'timing_key': f'results/{session_id}/{job_id}/timing.json',
              })
              print(f'  started job {job_id}')

          # Phase 2: poll all jobs together until each result lands, the job
          # fails fast (timing.json status=failed), or the global deadline passes.
          def exists(key):
              try:
                  s3.head_object(Bucket=BUCKET, Key=key)
                  return True
              except Exception:
                  return False

          def failed(job):
              try:
                  t = json.loads(s3.get_object(Bucket=BUCKET, Key=job['timing_key'])['Body'].read())
                  return t.get('status') == 'failed'
              except Exception:
                  return False

          pending = {j['example_key']: j for j in jobs}
          done, failures = [], []
          deadline = time.time() + POLL_TIMEOUT_S
          while pending and time.time() < deadline:
              for key in list(pending):
                  job = pending[key]
                  if exists(job['result_key']):
                      done.append(pending.pop(key))
                      print(f'  ✓ {key} result ready')
                  elif failed(job):
                      failures.append(pending.pop(key))
                      print(f'::warning::{key}: job failed (fail-fast) — keeping old example')
              if pending:
                  time.sleep(POLL_INTERVAL_S)

          for key in pending:
              print(f'::error::{key}: timed out after {POLL_TIMEOUT_S}s')

          # Always wipe every existing example result first: each deploy fully
          # regenerates from scratch, so no stale example can ever survive.
          existing = s3.list_objects_v2(Bucket=BUCKET, Prefix='results/example_')
          for obj in existing.get('Contents', []):
              s3.delete_object(Bucket=BUCKET, Key=obj['Key'])
              print(f"  deleted {obj['Key']}")

          # Phase 3: publish the examples that completed.
          for job in done:
              ek = job['example_key']
              s3.copy_object(
                  Bucket=BUCKET,
                  CopySource={'Bucket': BUCKET, 'Key': job['result_key']},
                  Key=f'results/{ek}.json',
              )
              print(f'  ✓ Updated results/{ek}.json')

          print(f'\nRegen summary: {len(done)} updated, {len(failures)} failed, '
                f'{len(pending)} timed out (of {len(examples)} examples).')

          # Hard fail: every example must regenerate successfully, or the deploy
          # fails (and the wiped examples stay gone until a clean run succeeds).
          if len(done) != len(examples):
              print('::error::example regeneration incomplete — failing the deploy.')
              sys.exit(1)
          EOF
